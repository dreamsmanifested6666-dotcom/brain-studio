# Render Blueprint for the Brain Studio backend.
#
# Deploy with:
#   1. Push this file to GitHub on the main branch.
#   2. In the Render dashboard: New → Blueprint → connect this repo.
#   3. Render auto-detects render.yaml and stages the service.
#
# Free-tier notes:
#   - Sleeps after 15 min idle. First request after a sleep wakes the
#     dyno (~30–60 s cold start) — the frontend falls back to its local
#     fakePredictor during that window.
#   - 512 MB RAM. fastembed + bge-small-en-v1.5 fits comfortably (~200 MB).
#   - CPU only. Embedding inference is ~50–150 ms per query after warm-up.

services:
  - type: web
    name: brain-studio-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LOG_LEVEL
        value: INFO
      - key: VERCEL_URL_PATTERN
        value: "https://(.*\\.vercel\\.app|brain-studio-kappa\\.vercel\\.app)"
